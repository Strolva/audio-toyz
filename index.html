<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Jigsaw Toy</title>
    <style>
        body { 
            background: #0f172a; color: #38bdf8; font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; 
        }
        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        #controls { margin-bottom: 20px; }
        
        button { 
            padding: 12px 24px; background: #38bdf8; color: #0f172a; border: none; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #fff; transform: translateY(-2px); }

        /* The Grid Container */
        #grid-container {
            position: relative;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* The faint background waveform */
        #ghost-wave {
            position: absolute;
            top: 15px; left: 15px;
            width: 380px; height: 380px; /* 3 cols of 120px + gaps */
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        #grid { 
            display: grid; 
            grid-template-columns: repeat(3, 120px); 
            gap: 10px; 
            position: relative;
            z-index: 1;
        }

        .piece { 
            width: 120px; height: 120px; background: rgba(51, 65, 85, 0.8); 
            cursor: grab; border-radius: 8px; border: 2px solid rgba(255,255,255,0.05);
            transition: transform 0.1s, box-shadow 0.3s;
            overflow: hidden;
        }
        .piece:active { cursor: grabbing; }
        .piece.correct { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        #status { margin-top: 20px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

    <h1>Audio Jigsaw</h1>
    
    <div id="controls">
        <button id="startBtn" onclick="initAudio()">1. INITIALIZE AUDIO</button>
        <button id="refBtn" onclick="playReference()" style="display:none;">2. LISTEN TO REFERENCE</button>
    </div>

    <div id="grid-container">
        <canvas id="ghost-wave"></canvas>
        <div id="grid"></div>
    </div>

    <p id="status">Click Initialize to start...</p>

    <script>
        let audioCtx, mainBuffer;
        let pieces = [0,1,2,3,4,5,6,7,8].sort(() => Math.random() - 0.5);
        const grid = document.getElementById('grid');
        const status = document.getElementById('status');

        async function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            status.innerText = "Loading audio file...";
            
            try {
                // IMPORTANT: Ensure your file is named exactly mysound.mp3
                const resp = await fetch('./mysound.mp3');
                const data = await resp.arrayBuffer();
                mainBuffer = await audioCtx.decodeAudioData(data);
                
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('refBtn').style.display = 'inline-block';
                status.innerText = "Audio Loaded. Arrange the pieces!";
                
                drawGhostWave();
                render();
            } catch (e) {
                status.innerText = "Error: Cannot find 'mysound.mp3'. Is it in the folder?";
                console.error(e);
            }
        }

        function playSlice(idx) {
            if (!mainBuffer) return;
            const source = audioCtx.createBufferSource();
            source.buffer = mainBuffer;
            const dur = mainBuffer.duration / 9;
            source.connect(audioCtx.destination);
            source.start(0, idx * dur, dur);
        }

        function playReference() {
            const source = audioCtx.createBufferSource();
            source.buffer = mainBuffer;
            source.connect(audioCtx.destination);
            source.start(0);
            status.innerText = "👂 Listening to reference...";
            source.onended = () => status.innerText = "Reconstruct the song!";
        }

        function drawGhostWave() {
            const canvas = document.getElementById('ghost-wave');
            canvas.width = 380; canvas.height = 380;
            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, 190);
            // Draw a continuous wave across the whole grid area
            for(let x=0; x<380; x++) {
                const y = 190 + Math.sin(x * 0.05) * 60 + Math.cos(x * 0.02) * 30;
                ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function render() {
            grid.innerHTML = '';
            const isSolved = pieces.every((p, i) => p === i);

            pieces.forEach((pIdx, i) => {
                const div = document.createElement('div');
                div.className = `piece ${pIdx === i ? 'correct' : ''}`;
                div.draggable = true;
                
                const cvs = document.createElement('canvas');
                cvs.width = 120; cvs.height = 120;
                div.appendChild(cvs);
                
                // Draw piece waveform
                const ctx = cvs.getContext('2d');
                ctx.strokeStyle = pIdx === i ? '#38bdf8' : '#64748b';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, 60);
                for(let x=0; x<120; x++) {
                    const gx = x + (pIdx * 120);
                    const y = 60 + Math.sin(gx * 0.05) * 60 + Math.cos(gx * 0.02) * 30;
                    ctx.lineTo(x, y);
                }
                ctx.stroke();

                // Listen on click
                div.onclick = () => {
                    playSlice(pIdx);
                    div.style.transform = "scale(0.95)";
                    setTimeout(() => div.style.transform = "scale(1)", 100);
                };

                // Drag and Drop Logic
                div.ondragstart = (e) => e.dataTransfer.setData('text', i);
                div.ondragover = (e) => e.preventDefault();
                div.ondrop = (e) => {
                    const from = e.dataTransfer.getData('text');
                    [pieces[from], pieces[i]] = [pieces[i], pieces[from]];
                    playSlice(pIdx);
                    render();
                };
                
                grid.appendChild(div);
            });

            if(isSolved) {
                status.innerText = "🎉 PERFECT HARMONY!";
                playReference();
            }
        }
    </script>
</body>
</html>
